name: Anypoint CLI Automation

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  cli:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      
      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4
        
      - name: Config Organization
        run: >
          anypoint-cli-v4 conf organization 9e58d8a9-658a-40c0-8954-e98759d6556e

      - name: Config Client Id
        run: >
          anypoint-cli-v4 conf client_id efa3c242e10046588e48963f89446074

      - name: Config Client Secret
        run: >
          anypoint-cli-v4 conf client_secret ec15075382A84EfFAa97B97C9Ce38B00

      - name: List All Mule Apps
        run: >
          anypoint-cli-v4 runtime-mgr:application:list --environment Sandbox

      - name: Describe Meta Data of one app
        run: >
          anypoint-cli-v4 runtime-mgr:application:describe 8872a819-75d4-4b55-a2d5-39b362371834 --environment Sandbox

      - name: Lists all async APIs in Exchange
        run: >
          anypoint-cli-v4 exchange:asset:list --organizationId 9e58d8a9-658a-40c0-8954-e98759d6556e --output json
